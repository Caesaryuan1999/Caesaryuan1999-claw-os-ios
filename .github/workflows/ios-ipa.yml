name: Build iOS IPA

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      app_bundle_id:
        description: Main app bundle identifier
        required: true
        default: app.veilping.clawoschat
      extension_bundle_id:
        description: Notification extension bundle identifier
        required: true
        default: app.veilping.clawoschat.TinodiosNSExtension
      export_method:
        description: Xcode export method
        required: true
        default: release-testing
        type: choice
        options:
          - release-testing
          - app-store-connect
          - enterprise
      build_number:
        description: Optional CFBundleVersion override
        required: false
      marketing_version:
        description: CFBundleShortVersionString
        required: true
        default: 1.0.1

jobs:
  build:
    name: Build CLAW OS IPA
    runs-on: macos-15
    timeout-minutes: 60

    env:
      APP_BUNDLE_ID: ${{ github.event.inputs.app_bundle_id || 'app.veilping.clawoschat' }}
      EXTENSION_BUNDLE_ID: ${{ github.event.inputs.extension_bundle_id || 'app.veilping.clawoschat.TinodiosNSExtension' }}
      EXPORT_METHOD: ${{ github.event.inputs.export_method || 'release-testing' }}
      BUILD_NUMBER: ${{ github.event.inputs.build_number || github.run_number }}
      MARKETING_VERSION: ${{ github.event.inputs.marketing_version || '1.0.1' }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID || 'NBR9Y9N42C' }}
      IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
      IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
      IOS_APP_PROFILE_BASE64: ${{ secrets.IOS_APP_PROFILE_BASE64 }}
      IOS_EXTENSION_PROFILE_BASE64: ${{ secrets.IOS_EXTENSION_PROFILE_BASE64 }}
      IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
      IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore script execute permissions
        run: |
          chmod +x Scripts/*.sh
          chmod +x Scripts/ci/*.sh

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Install CocoaPods dependencies
        env:
          COCOAPODS_DISABLE_STATS: "true"
        run: |
          if ! command -v pod >/dev/null 2>&1; then
            gem install cocoapods --no-document
          fi

          if command -v bundle >/dev/null 2>&1 && [ -f Gemfile ]; then
            bundle install
            POD_INSTALL_CMD="bundle exec pod install"
          else
            POD_INSTALL_CMD="pod install"
          fi

          for attempt in 1 2 3 4 5; do
            echo "Running CocoaPods install, attempt ${attempt}/5"
            if ${POD_INSTALL_CMD}; then
              exit 0
            fi
            if [ "${attempt}" -eq 5 ]; then
              echo "::error::CocoaPods install failed after 5 attempts."
              exit 1
            fi
            sleep $((attempt * 30))
          done

      - name: Install signing assets
        run: bash Scripts/ci/install_ios_signing_assets.sh

      - name: Configure project signing
        run: |
          gem install xcodeproj --no-document
          ruby Scripts/ci/configure_ios_signing.rb

      - name: Create export options
        run: |
          mkdir -p build
          cat > build/ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>compileBitcode</key>
            <false/>
            <key>destination</key>
            <string>export</string>
            <key>method</key>
            <string>${EXPORT_METHOD}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${APP_BUNDLE_ID}</key>
              <string>${APP_PROFILE_NAME}</string>
              <key>${EXTENSION_BUNDLE_ID}</key>
              <string>${EXTENSION_PROFILE_NAME}</string>
            </dict>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>thinning</key>
            <string>&lt;none&gt;</string>
          </dict>
          </plist>
          PLIST
          plutil -lint build/ExportOptions.plist

      - name: Prepare Firebase config
        run: |
          if [ -n "${IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64:-}" ]; then
            echo "$IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64" | base64 --decode > GoogleService-Info.plist
            echo "Using GoogleService-Info.plist from GitHub secret."
          elif [ ! -f GoogleService-Info.plist ]; then
            echo "::warning::GoogleService-Info.plist is missing. Creating a placeholder config for IPA build only. Push notifications will not work until a real Firebase config is supplied."
            cat > GoogleService-Info.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CLIENT_ID</key>
            <string>0-placeholder.apps.googleusercontent.com</string>
            <key>REVERSED_CLIENT_ID</key>
            <string>com.googleusercontent.apps.0-placeholder</string>
            <key>API_KEY</key>
            <string>placeholder-api-key</string>
            <key>GCM_SENDER_ID</key>
            <string>000000000000</string>
            <key>PLIST_VERSION</key>
            <string>1</string>
            <key>BUNDLE_ID</key>
            <string>${APP_BUNDLE_ID}</string>
            <key>PROJECT_ID</key>
            <string>claw-os-placeholder</string>
            <key>STORAGE_BUCKET</key>
            <string>claw-os-placeholder.appspot.com</string>
            <key>GOOGLE_APP_ID</key>
            <string>1:000000000000:ios:0000000000000000000000</string>
            <key>IS_ADS_ENABLED</key>
            <false/>
            <key>IS_ANALYTICS_ENABLED</key>
            <false/>
            <key>IS_APPINVITE_ENABLED</key>
            <false/>
            <key>IS_GCM_ENABLED</key>
            <false/>
            <key>IS_SIGNIN_ENABLED</key>
            <false/>
          </dict>
          </plist>
          PLIST
          fi
          plutil -lint GoogleService-Info.plist

      - name: Archive
        run: |
          xcodebuild archive \
            -workspace Tinodios.xcworkspace \
            -scheme Tinodios \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -archivePath build/CLAWOS.xcarchive \
            CURRENT_PROJECT_VERSION="${BUILD_NUMBER}" \
            MARKETING_VERSION="${MARKETING_VERSION}"

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/CLAWOS.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist build/ExportOptions.plist

      - name: Validate IPA for third-party signing platform
        run: |
          set -euo pipefail
          IPA_PATH="$(find build/export -name '*.ipa' -type f | head -n 1)"
          if [ -z "$IPA_PATH" ]; then
            echo "::error::IPA was not generated."
            exit 1
          fi
          echo "IPA_PATH=$IPA_PATH" >> "$GITHUB_ENV"
          unzip -l "$IPA_PATH" | tee build/ipa-files.txt
          if ! grep -q 'Payload/.*\.app/embedded.mobileprovision' build/ipa-files.txt; then
            echo "::error::IPA does not contain embedded.mobileprovision."
            exit 1
          fi
          if ! grep -q 'Payload/.*\.app/Info.plist' build/ipa-files.txt; then
            echo "::error::IPA does not contain app Info.plist."
            exit 1
          fi

          rm -rf build/ipa-inspect
          mkdir -p build/ipa-inspect
          unzip -q "$IPA_PATH" -d build/ipa-inspect
          APP_PATH="$(find build/ipa-inspect/Payload -maxdepth 1 -name '*.app' -type d | head -n 1)"
          INFO_PLIST="$APP_PATH/Info.plist"
          DISPLAY_NAME="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleDisplayName' "$INFO_PLIST")"
          BUNDLE_ID="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$INFO_PLIST")"
          VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$INFO_PLIST")"
          VERSION_BUILD="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$INFO_PLIST")"

          test "$DISPLAY_NAME" = "CLAW OS" || { echo "::error::Unexpected CFBundleDisplayName: $DISPLAY_NAME"; exit 1; }
          test "$BUNDLE_ID" = "${APP_BUNDLE_ID}" || { echo "::error::Unexpected CFBundleIdentifier: $BUNDLE_ID"; exit 1; }
          test "$VERSION" = "${MARKETING_VERSION}" || { echo "::error::Unexpected CFBundleShortVersionString: $VERSION"; exit 1; }
          test "$VERSION_BUILD" = "${BUILD_NUMBER}" || { echo "::error::Unexpected CFBundleVersion: $VERSION_BUILD"; exit 1; }

          cat > build/BUILD-IDENTITY.txt <<IDENTITY
          Product: CLAW OS
          Bundle ID: ${BUNDLE_ID}
          Version: ${VERSION}
          Build: ${VERSION_BUILD}
          Git commit: ${GITHUB_SHA}
          IDENTITY
          cat build/BUILD-IDENTITY.txt

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: claw-os-ios-v${{ env.MARKETING_VERSION }}-build-${{ env.BUILD_NUMBER }}
          path: |
            build/export/*.ipa
            build/ExportOptions.plist
            build/ipa-files.txt
            build/BUILD-IDENTITY.txt
          if-no-files-found: error
          retention-days: 7

name: iOS Smoke Test

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ios-smoke.yml"
      - "Tinodios/**"
      - "TinodiosDB/**"
      - "TinodiosUITests/**"
      - "TinodeSDK/**"
      - "Tinodios.xcodeproj/**"
      - "Tinodios.xcworkspace/**"
      - "Podfile"
      - "Podfile.lock"
  workflow_dispatch:

concurrency:
  group: ios-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Build and launch CLAW OS
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore script execute permissions
        run: |
          chmod +x Scripts/*.sh || true
          chmod +x Scripts/ci/*.sh || true

      - name: Show Xcode and simulator versions
        run: |
          xcodebuild -version
          xcodebuild -showsdks
          xcrun simctl list devices available

      - name: Install CocoaPods dependencies
        env:
          COCOAPODS_DISABLE_STATS: "true"
        run: |
          if ! command -v pod >/dev/null 2>&1; then
            gem install cocoapods --no-document
          fi

          if command -v bundle >/dev/null 2>&1 && [ -f Gemfile ]; then
            bundle install
            POD_INSTALL_CMD="bundle exec pod install"
          else
            POD_INSTALL_CMD="pod install"
          fi

          for attempt in 1 2 3 4 5; do
            echo "Running CocoaPods install, attempt ${attempt}/5"
            if ${POD_INSTALL_CMD}; then
              exit 0
            fi
            if [ "${attempt}" -eq 5 ]; then
              echo "::error::CocoaPods install failed after 5 attempts."
              exit 1
            fi
            sleep $((attempt * 30))
          done

      - name: Prepare Firebase placeholder
        run: |
          if [ ! -f GoogleService-Info.plist ]; then
            cat > GoogleService-Info.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CLIENT_ID</key>
            <string>0-placeholder.apps.googleusercontent.com</string>
            <key>REVERSED_CLIENT_ID</key>
            <string>com.googleusercontent.apps.0-placeholder</string>
            <key>API_KEY</key>
            <string>placeholder-api-key</string>
            <key>GCM_SENDER_ID</key>
            <string>000000000000</string>
            <key>PLIST_VERSION</key>
            <string>1</string>
            <key>BUNDLE_ID</key>
            <string>app.veilping.clawoschat</string>
            <key>PROJECT_ID</key>
            <string>claw-os-placeholder</string>
            <key>STORAGE_BUCKET</key>
            <string>claw-os-placeholder.appspot.com</string>
            <key>GOOGLE_APP_ID</key>
            <string>1:000000000000:ios:0000000000000000000000</string>
            <key>IS_ADS_ENABLED</key>
            <false/>
            <key>IS_ANALYTICS_ENABLED</key>
            <false/>
            <key>IS_APPINVITE_ENABLED</key>
            <false/>
            <key>IS_GCM_ENABLED</key>
            <false/>
            <key>IS_SIGNIN_ENABLED</key>
            <false/>
          </dict>
          </plist>
          PLIST
          fi
          plutil -lint GoogleService-Info.plist

      - name: Build and launch simulator app
        run: |
          set -euo pipefail

          DEVICE_ID="$(xcrun simctl list devices available | sed -n 's/^[[:space:]]*iPhone [^(]*(\([A-Fa-f0-9-]*\)) .*$/\1/p' | head -n 1 | xargs)"
          if [ -z "${DEVICE_ID}" ]; then
            echo "::error::No available iPhone simulator found."
            exit 1
          fi
          DEVICE_NAME="$(xcrun simctl list devices available | grep "${DEVICE_ID}" | sed -E 's/^[[:space:]]*([^()]*) .*/\1/' | xargs)"
          DERIVED_DATA_PATH="${PWD}/build/DerivedData"
          echo "Using simulator: ${DEVICE_NAME} (${DEVICE_ID})"

          xcodebuild build \
            -workspace Tinodios.xcworkspace \
            -scheme Tinodios \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,id=${DEVICE_ID}" \
            -derivedDataPath "${DERIVED_DATA_PATH}" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | tee build-ios-smoke.log

          APP_PATH="$(find "${DERIVED_DATA_PATH}/Build/Products/Debug-iphonesimulator" -maxdepth 1 -name '*.app' -type d | head -n 1)"
          if [ -z "${APP_PATH}" ]; then
            echo "::error::Simulator app was not generated."
            exit 1
          fi
          echo "Installing ${APP_PATH}"

          xcrun simctl boot "${DEVICE_ID}" || true
          xcrun simctl bootstatus "${DEVICE_ID}" -b
          xcrun simctl install "${DEVICE_ID}" "${APP_PATH}"
          xcrun simctl launch "${DEVICE_ID}" app.veilping.clawoschat | tee sim-launch.log
          sleep 12

          xcrun simctl spawn "${DEVICE_ID}" ps -A | tee sim-processes.txt
          if ! grep -E 'Tinodios|CLAW OS|clawos' sim-processes.txt >/dev/null; then
            echo "::error::CLAW OS process is not running after launch; possible startup crash."
            exit 1
          fi

          RECENT_CRASHES="$(find "$HOME/Library/Logs/DiagnosticReports" -name '*.crash' -mmin -2 2>/dev/null | grep -E 'Tinodios|CLAW|clawos|Tinode' || true)"
          if [ -n "${RECENT_CRASHES}" ]; then
            echo "::error::Recent CLAW OS crash log detected."
            echo "${RECENT_CRASHES}"
            exit 1
          fi

      - name: Upload smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-smoke-logs
          path: |
            build-ios-smoke.log
            sim-launch.log
            sim-processes.txt
            $HOME/Library/Logs/DiagnosticReports/*.crash
          if-no-files-found: ignore
          retention-days: 7
